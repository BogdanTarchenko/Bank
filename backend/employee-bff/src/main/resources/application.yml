server:
  port: 8085

spring:
  application:
    name: employee-bff
  datasource:
    url: jdbc:postgresql://localhost:5437/bank_employee_bff
    username: bank
    password: bank_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

services:
  core-service:
    url: http://localhost:8080
  user-service:
    url: http://localhost:8082
  credit-service:
    url: http://localhost:8083
