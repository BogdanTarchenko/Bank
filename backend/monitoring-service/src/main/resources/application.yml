server:
  port: 8086

spring:
  application:
    name: monitoring-service
  datasource:
    url: jdbc:postgresql://localhost:5439/bank_monitoring
    username: bank
    password: bank_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
