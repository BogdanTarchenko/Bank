services:
  # --- Databases ---
  postgres-core:
    image: postgres:17-alpine
    container_name: bank-postgres-core
    environment:
      POSTGRES_DB: bank_core
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5438:5432"
    volumes:
      - pgdata-core:/var/lib/postgresql/data

  postgres-auth:
    image: postgres:17-alpine
    container_name: bank-postgres-auth
    environment:
      POSTGRES_DB: bank_auth
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  postgres-user:
    image: postgres:17-alpine
    container_name: bank-postgres-user
    environment:
      POSTGRES_DB: bank_user
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5434:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data

  postgres-credit:
    image: postgres:17-alpine
    container_name: bank-postgres-credit
    environment:
      POSTGRES_DB: bank_credit
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata-credit:/var/lib/postgresql/data

  postgres-client-bff:
    image: postgres:17-alpine
    container_name: bank-postgres-client-bff
    environment:
      POSTGRES_DB: bank_client_bff
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5436:5432"
    volumes:
      - pgdata-client-bff:/var/lib/postgresql/data

  postgres-employee-bff:
    image: postgres:17-alpine
    container_name: bank-postgres-employee-bff
    environment:
      POSTGRES_DB: bank_employee_bff
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5437:5432"
    volumes:
      - pgdata-employee-bff:/var/lib/postgresql/data

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"

  # --- Kafka ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: bank-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "bank-kafka-cluster-id-01"
    ports:
      - "9094:9094"

volumes:
  pgdata-core:
  pgdata-auth:
  pgdata-user:
  pgdata-credit:
  pgdata-client-bff:
  pgdata-employee-bff:
