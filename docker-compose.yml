services:
  # --- Databases ---
  postgres-core:
    image: postgres:17-alpine
    container_name: bank-postgres-core
    environment:
      POSTGRES_DB: bank_core
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5438:5432"
    volumes:
      - pgdata-core:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_core"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-auth:
    image: postgres:17-alpine
    container_name: bank-postgres-auth
    environment:
      POSTGRES_DB: bank_auth
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_auth"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-user:
    image: postgres:17-alpine
    container_name: bank-postgres-user
    environment:
      POSTGRES_DB: bank_user
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5434:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_user"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-credit:
    image: postgres:17-alpine
    container_name: bank-postgres-credit
    environment:
      POSTGRES_DB: bank_credit
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata-credit:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_credit"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-client-bff:
    image: postgres:17-alpine
    container_name: bank-postgres-client-bff
    environment:
      POSTGRES_DB: bank_client_bff
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5436:5432"
    volumes:
      - pgdata-client-bff:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_client_bff"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-employee-bff:
    image: postgres:17-alpine
    container_name: bank-postgres-employee-bff
    environment:
      POSTGRES_DB: bank_employee_bff
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5437:5432"
    volumes:
      - pgdata-employee-bff:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_employee_bff"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-monitoring:
    image: postgres:17-alpine
    container_name: bank-postgres-monitoring
    environment:
      POSTGRES_DB: bank_monitoring
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank_secret
    ports:
      - "5439:5432"
    volumes:
      - pgdata-monitoring:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_monitoring"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Kafka ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: bank-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "bank-kafka-cluster-id-01"
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 15s
      retries: 20
      start_period: 20s

  # --- Services ---
  core-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: core-service
    container_name: bank-core-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-core:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: auth-service
    container_name: bank-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-auth:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: user-service
    container_name: bank-user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-user:
        condition: service_healthy

  credit-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: credit-service
    container_name: bank-credit-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-credit:
        condition: service_healthy

  client-bff:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: client-bff
    container_name: bank-client-bff
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-client-bff:
        condition: service_healthy
      redis:
        condition: service_healthy

  employee-bff:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: employee-bff
    container_name: bank-employee-bff
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-employee-bff:
        condition: service_healthy
      redis:
        condition: service_healthy

  monitoring-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.prebuilt
      args:
        SERVICE_NAME: monitoring-service
    container_name: bank-monitoring-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres-monitoring:
        condition: service_healthy

volumes:
  pgdata-core:
  pgdata-auth:
  pgdata-user:
  pgdata-credit:
  pgdata-client-bff:
  pgdata-employee-bff:
  pgdata-monitoring:
